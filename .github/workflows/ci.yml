name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run root tests (transport, core, platform)
        run: zig build test --summary all
        working-directory: zpm

      - name: Run CLI tests (pkg modules)
        run: zig build test --summary all
        working-directory: zpm/cli
